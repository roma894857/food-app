name: Android CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup environment and build
        run: |
          # 1. Видаляємо старі криві файли
          rm -rf gradle/wrapper/gradle-wrapper.jar
          
          # 2. Генеруємо чистий враппер
          gradle wrapper --gradle-version 8.5
          
          # 3. Створюємо файл налаштувань для репозиторіїв
          cat << 'EOF' > settings.gradle.kts
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "food-app"
          include(":app")
          EOF
          
          # 4. Виправляємо версії плагінів прямо у файлі build.gradle.kts
          if [ -f "app/build.gradle.kts" ]; then
            sed -i 's/id("com.android.application")/id("com.android.application") version "8.2.2"/' app/build.gradle.kts
            sed -i 's/id("org.jetbrains.kotlin.android")/id("org.jetbrains.kotlin.android") version "1.9.22"/' app/build.gradle.kts
          fi

          # 5. Робимо файл виконуваним і збираємо
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk