name: Android CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Генеруємо чистий враппер в ізоляції
    - name: Generate Clean Gradle Wrapper
      run: |
        mkdir temp-gradle
        cd temp-gradle
        echo "" > settings.gradle
        gradle wrapper --gradle-version 8.5
        cd ..
        mkdir -p gradle
        cp -r temp-gradle/gradle/wrapper gradle/
        rm -rf temp-gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    # Ін'єкція правильних репозиторіїв у твій оригінальний конфіг без його затирання
    - name: Inject Repositories to Settings
      run: |
        if [ -f settings.gradle ]; then
          sed -i '1s/^/pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }\n/' settings.gradle
        elif [ -f settings.gradle.kts ]; then
          sed -i '1s/^/pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }\n/' settings.gradle.kts
        fi

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('/*.gradle*', '/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7